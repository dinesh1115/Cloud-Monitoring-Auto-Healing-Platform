version: '3.8'

services:
  # Cloud Monitoring & Auto-Healing Platform
  app:
    build: .
    container_name: cloud-monitoring-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SERVER_PORT=8080
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - monitoring-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Redis for event handling and caching
  redis:
    image: redis:7-alpine
    container_name: cloud-monitoring-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - monitoring-network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis-secure-password
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # PostgreSQL for persistent storage (optional, for production)
  postgres:
    image: postgres:15-alpine
    container_name: cloud-monitoring-db
    environment:
      - POSTGRES_USER=monitoring_user
      - POSTGRES_PASSWORD=secure_password_123
      - POSTGRES_DB=cloud_monitoring_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - monitoring-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U monitoring_user -d cloud_monitoring_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  monitoring-network:
    driver: bridge
