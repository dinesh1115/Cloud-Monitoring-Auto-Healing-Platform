spring.application.name=Cloud_Monitoring_and_Auto-Healing_Platform
server.port=8080

# Redis Configuration (optional)
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:}
spring.redis.timeout=2000
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0
spring.redis.jedis.pool.max-wait=-1ms

# Feature toggles
app.redis.enabled=${APP_REDIS_ENABLED:false}
app.aws.enabled=${APP_AWS_ENABLED:false}
app.python.enabled=${APP_PYTHON_ENABLED:true}
app.cloudwatch.enabled=${APP_CLOUDWATCH_ENABLED:false}

# PostgreSQL Configuration (optional, for production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cloud_monitoring_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:monitoring_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secure_password_123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.redis.enabled=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.dinesh.backend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

